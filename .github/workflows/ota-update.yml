name: OTA Update on Main Push

on:
  push:
    branches:
      - master

jobs:
  update:
    name: EAS Update
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm install

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Push OTA update
        run: eas update --branch production --message "Auto update from main"
