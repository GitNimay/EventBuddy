name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK
        run: eas build --platform android --profile production --non-interactive
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          EXPO_PUBLIC_CLOUDINARY_CLOUD_NAME: ${{ secrets.EXPO_PUBLIC_CLOUDINARY_CLOUD_NAME }}
          EXPO_PUBLIC_CLOUDINARY_UPLOAD_PRESET: ${{ secrets.EXPO_PUBLIC_CLOUDINARY_UPLOAD_PRESET }}

      - name: Get build URL
        id: build
        run: |
          BUILD_JSON=$(eas build:list --platform android --limit 1 --json)
          BUILD_URL=$(echo "$BUILD_JSON" | jq -r '.[0].artifacts.buildUrl')
          echo "build_url=$BUILD_URL" >> "$GITHUB_OUTPUT"

      - name: Download APK
        run: curl -L -o eventbuddy-${{ github.ref_name }}.apk "${{ steps.build.outputs.build_url }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: eventbuddy-${{ github.ref_name }}.apk
          name: EventBuddy ${{ github.ref_name }}
          body: |
            ## EventBuddy ${{ github.ref_name }}

            ### What's new
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for full details.

            ### Install
            1. Download `eventbuddy-${{ github.ref_name }}.apk` below
            2. Enable "Install from unknown sources" on your Android device
            3. Open the APK to install
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
